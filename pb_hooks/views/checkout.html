
<div class="max-w-4xl mx-auto" x-data="checkoutPage()">
    <h1 class="text-3xl font-light mb-8 border-b border-gray-200 dark:border-bmw-darkBorder pb-4 text-gray-900 dark:text-white">CHECKOUT</h1>
    
    <template x-if="items.length === 0">
        <div class="py-12 text-center text-gray-500">Your cart is empty. Cannot checkout.</div>
    </template>

    <template x-if="items.length > 0">
        <div class="bg-white dark:bg-bmw-surface border border-gray-200 dark:border-bmw-darkBorder p-6 rounded-sm">
            <h2 class="text-xl font-light mb-6 text-gray-900 dark:text-white">Payment Details</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">Order Total</label>
                    <div class="text-2xl font-medium text-gray-900 dark:text-white" x-text="'₩' + subtotal.toLocaleString()"></div>
                </div>
                <!-- Buyer Email (required for Inicis/KCP) -->
                <div class="mt-4" x-show="selectedMethod !== 'kakaopay'">
                    <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">구매자 이메일</label>
                    <input type="email" class="w-full border rounded-sm p-2 mb-4" placeholder="example@domain.com" x-model="buyerEmail" required />
                    
                    <label class="block text-sm text-gray-500 dark:text-gray-400 mb-1">구매자 휴대폰 번호</label>
                    <input type="tel" class="w-full border rounded-sm p-2" placeholder="010-1234-5678" x-model="buyerPhone" required />
                </div>
                </div>
            
            <h2 class="text-xl font-light mb-6 text-gray-900 dark:text-white">Payment Method</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <label class="relative flex flex-col p-4 border cursor-pointer rounded-sm transition" :class="selectedMethod === 'kakaopay' ? 'border-bmw-blue bg-blue-50/50 dark:bg-bmw-blue/10' : 'border-gray-200 dark:border-bmw-darkBorder'">
                    <input type="radio" name="payMethod" value="kakaopay" x-model="selectedMethod" class="absolute top-4 right-4 h-4 w-4 text-bmw-blue">
                    <span class="text-sm font-medium text-gray-900 dark:text-white">카카오페이</span>
                    <span class="text-xs text-gray-500 mt-1">간편결제</span>
                </label>
                <label class="relative flex flex-col p-4 border cursor-pointer rounded-sm transition" :class="selectedMethod === 'inicis' ? 'border-bmw-blue bg-blue-50/50 dark:bg-bmw-blue/10' : 'border-gray-200 dark:border-bmw-darkBorder'">
                    <input type="radio" name="payMethod" value="inicis" x-model="selectedMethod" class="absolute top-4 right-4 h-4 w-4 text-bmw-blue">
                    <span class="text-sm font-medium text-gray-900 dark:text-white">KG이니시스</span>
                    <span class="text-xs text-gray-500 mt-1">신용카드 / 계좌이체</span>
                    <span class="text-xs text-gray-500 mt-1">신용카드 / 계좌이체</span>
                </label>
                <label class="relative flex flex-col p-4 border cursor-pointer rounded-sm transition" :class="selectedMethod === 'kcp' ? 'border-bmw-blue bg-blue-50/50 dark:bg-bmw-blue/10' : 'border-gray-200 dark:border-bmw-darkBorder'">
                    <input type="radio" name="payMethod" value="kcp" x-model="selectedMethod" class="absolute top-4 right-4 h-4 w-4 text-bmw-blue">
                    <span class="text-sm font-medium text-gray-900 dark:text-white">NHN KCP</span>
                    <span class="text-xs text-gray-500 mt-1">카드 / 가상계좌</span>
                </label>
            </div>
            
            <div class="mt-8">
                <button @click="requestPayment" :disabled="processing" class="w-full bg-gray-900 dark:bg-white text-white dark:text-black hover:bg-black dark:hover:bg-gray-200 px-8 py-4 uppercase tracking-widest text-sm font-bold transition duration-300 disabled:opacity-50">
                    <span x-show="!processing" x-text="'PAY WITH ' + selectedMethod.toUpperCase()"></span>
                    <span x-show="processing">PROCESSING...</span>
                </button>
            </div>
        </div>
    </template>
</div>

<script>
function checkoutPage() {
    return {
        items: JSON.parse(localStorage.getItem('cart') || '[]'),
        buyerEmail: '',
        buyerPhone: '',
        
        async init() {
            try {
                const authStr = localStorage.getItem('pocketbase_auth');
                if (!authStr) return;
                const authData = JSON.parse(authStr);
                const token = authData.token;
                const userId = authData.record?.id || authData.model?.id;
                
                if (token && userId) {
                    const res = await fetch('/api/collections/users/records/' + userId, {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    if (res.ok) {
                        const user = await res.json();
                        if (user.phone && !this.buyerPhone) this.buyerPhone = user.phone;
                        if (user.email && !this.buyerEmail) this.buyerEmail = user.email;
                        
                        // Update local storage with fresh data just in case
                        authData.record = user;
                        localStorage.setItem('pocketbase_auth', JSON.stringify(authData));
                    }
                }
            } catch (err) {
                console.error("Failed to fetch fresh user data:", err);
            }
        },
        
        processing: false,
        selectedMethod: 'kakaopay',
        channelKeys: {
            kakaopay: "{{.channelKeyKakaopay}}",
            inicis: "{{.channelKeyInicis}}",
            kcp: "{{.channelKeyKcp}}"
        },
        payMethods: {
            kakaopay: "EASY_PAY",
            inicis: "CARD",
            kcp: "CARD"
        },
        get subtotal() {
            return this.items.reduce((acc, item) => acc + (item.price * item.quantity), 0);
        },
        async requestPayment() {
            if (this.items.length === 0) return;
            
            const channelKey = this.channelKeys[this.selectedMethod];
            if (!channelKey) {
                alert("선택하신 결제 수단의 채널 키가 설정되지 않았습니다.");
                return;
            }

            if (this.selectedMethod !== 'kakaopay') {
                if (!this.buyerEmail) {
                    alert("KG이니시스 및 NHN KCP 결제 시 구매자 이메일은 필수 입력입니다.");
                    const emailInput = document.querySelector('input[type="email"]');
                    if (emailInput) emailInput.focus();
                    return;
                }
                if (!this.buyerPhone) {
                    alert("KG이니시스 및 NHN KCP 결제 시 구매자 휴대폰 번호는 필수 입력입니다.");
                    const phoneInput = document.querySelector('input[type="tel"]');
                    if (phoneInput) phoneInput.focus();
                    return;
                }
            }

            this.processing = true;
            
            try {
                // Prepare headers with auth token if available
                const headers = { 'Content-Type': 'application/json' };
                const authStr = localStorage.getItem('pocketbase_auth');
                if (authStr) {
                    try {
                        const authData = JSON.parse(authStr);
                        if (authData.token) {
                            headers['Authorization'] = 'Bearer ' + authData.token;
                        }
                    } catch(e) {}
                }

                // 1. Prepare order on server
                const res = await fetch('/api/orders/prep', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ cart: this.items })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || "Failed to prepare order");
                }
                
                // 2. Build PortOne SDK options
                const paymentOptions = {
                    storeId: "{{.portoneStoreId}}",
                    channelKey: channelKey,
                    paymentId: data.orderId,
                    orderName: "D'roll Shop Order",
                    totalAmount: data.amount,
                    currency: "CURRENCY_KRW",
                    customer: {
                        fullName: "고객"
                    },
                    redirectUrl: window.location.origin + "/payment/complete",
                // (PortOne requires email for these methods)
                // Add email to customer object if method is not KakaoPay
                // and buyerEmail is provided by the user
                // This will satisfy the API requirement.
                // Note: paymentOptions.customer already exists.
                // We'll add email property conditionally after the object creation.
                // (Will be inserted in next chunk)
                };

                // Set payMethod for all selected payment methods
                if (this.selectedMethod !== 'kakaopay') {
                    if (this.buyerEmail) paymentOptions.customer.email = this.buyerEmail;
                    if (this.buyerPhone) paymentOptions.customer.phoneNumber = this.buyerPhone.replace(/[^0-9]/g, '');
                }
                // Assign the appropriate payMethod based on selectedMethod
                if (this.selectedMethod === 'kakaopay') {
                    paymentOptions.payMethod = "EASY_PAY";
                } else {
                    // For KG 이니시스 and NHN KCP, use the method defined in payMethods mapping
                    paymentOptions.payMethod = this.payMethods[this.selectedMethod] || "CARD";
                }
                // End of payMethod assignment

                PortOne.requestPayment(paymentOptions).then(function(response) {
                    if (response.code !== undefined) {
                        alert("Payment failed: " + response.message);
                        window.dispatchEvent(new CustomEvent('payment-failed'));
                        return;
                    }
                    
                    // Clear cart on success
                    localStorage.removeItem('cart');
                    window.dispatchEvent(new Event('cart-updated'));
                    
                    window.location.href = "/payment/complete?paymentId=" + response.paymentId;
                });
            } catch(err) {
                alert("Checkout error: " + err.message);
                this.processing = false;
            }
        }
    }
}

window.addEventListener('payment-failed', () => {
    // Reset processing state if PortOne iframe is closed
    const el = document.querySelector('[x-data="checkoutPage()"]');
    if(el && el.__x) {
        el.__x.$data.processing = false;
    }
});
</script>
