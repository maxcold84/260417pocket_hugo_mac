{{ define "main" }}
<main class="max-w-4xl mx-auto px-4 py-12 flex-1 w-full" x-data="myOrdersPage()">

    <h1 class="text-3xl font-light mb-8 border-b border-gray-200 dark:border-bmw-darkBorder pb-4 text-gray-900 dark:text-white uppercase tracking-widest">
        {{ i18n "orders" }}
    </h1>

    <!-- Loading State -->
    <div x-show="loading" class="flex items-center justify-center py-20">
        <div class="flex flex-col items-center gap-4">
            <svg class="animate-spin h-8 w-8 text-bmw-blue" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-gray-500 dark:text-gray-400 text-sm">{{ i18n "processing" }}</p>
        </div>
    </div>

    <!-- Error State -->
    <div x-show="error && !loading" x-cloak class="bg-red-500/10 border border-red-500/30 text-red-600 dark:text-red-400 px-6 py-4 mb-6 text-sm">
        <span x-text="error"></span>
    </div>

    <!-- Not Logged In -->
    <div x-show="!loggedIn && !loading" x-cloak class="bg-white dark:bg-bmw-surface border border-gray-200 dark:border-bmw-darkBorder p-12 rounded-sm text-center">
        <svg class="w-16 h-16 mx-auto mb-6 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <p class="text-gray-500 dark:text-gray-400 mb-6">로그인 후 주문 내역을 확인할 수 있습니다.</p>
        <a href="/login" class="inline-block bg-bmw-blue hover:bg-blue-700 text-white px-8 py-3 uppercase tracking-wider text-sm font-medium transition duration-300">
            {{ i18n "login" }}
        </a>
    </div>

    <!-- Empty Orders -->
    <div x-show="loggedIn && !loading && orders.length === 0 && !error" x-cloak class="bg-white dark:bg-bmw-surface border border-gray-200 dark:border-bmw-darkBorder p-12 rounded-sm text-center">
        <svg class="w-16 h-16 mx-auto mb-6 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <p class="text-gray-500 dark:text-gray-400 mb-6">주문 내역이 없습니다.</p>
        <a href="/" class="inline-block bg-bmw-blue hover:bg-blue-700 text-white px-8 py-3 uppercase tracking-wider text-sm font-medium transition duration-300">
            {{ i18n "explore_collection" }}
        </a>
    </div>

    <!-- Orders List -->
    <div x-show="loggedIn && !loading && orders.length > 0" x-cloak class="space-y-4">
        <template x-for="order in orders" :key="order.id">
            <div class="bg-white dark:bg-bmw-surface border border-gray-200 dark:border-bmw-darkBorder rounded-sm overflow-hidden transition hover:shadow-md">
                <!-- Order Header -->
                <div class="px-6 py-4 border-b border-gray-100 dark:border-bmw-darkBorder flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center gap-4 flex-wrap">
                        <span class="text-xs text-gray-400 dark:text-gray-500" x-text="formatDate(order.created)"></span>
                        <span class="text-xs font-mono text-gray-500 dark:text-gray-400" x-text="'#' + order.id.slice(0, 8).toUpperCase()"></span>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider"
                              :class="statusClass(order.status)"
                              x-text="statusLabel(order.status)"></span>
                    </div>
                </div>

                <!-- Order Items -->
                <div class="px-6 py-4">
                    <template x-for="item in order.expand?.order_items_via_order || []" :key="item.id">
                        <div class="flex items-center gap-4 py-3 border-b border-gray-50 dark:border-bmw-darkBorder/50 last:border-0">
                            <div class="w-14 h-14 bg-gray-100 dark:bg-black flex-shrink-0 flex items-center justify-center border border-gray-200 dark:border-bmw-darkBorder overflow-hidden rounded-sm">
                                <template x-if="item.expand?.product?.images?.length">
                                    <img :src="'/api/files/' + item.expand.product.collectionId + '/' + item.expand.product.id + '/' + item.expand.product.images[0]" 
                                         class="w-full h-full object-cover" :alt="item.expand?.product?.name || 'Product'">
                                </template>
                                <template x-if="!item.expand?.product?.images?.length">
                                    <span class="text-[10px] text-gray-400">IMG</span>
                                </template>
                            </div>
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium text-gray-900 dark:text-white truncate" x-text="item.expand?.product?.name || '상품'"></p>
                                <p class="text-xs text-gray-500 mt-0.5">
                                    <span x-text="'₩' + (item.unit_price || 0).toLocaleString()"></span>
                                    <span class="mx-1">×</span>
                                    <span x-text="item.quantity + '개'"></span>
                                </p>
                            </div>
                            <div class="text-right flex-shrink-0">
                                <p class="text-sm font-medium text-gray-900 dark:text-white" x-text="'₩' + ((item.unit_price || 0) * (item.quantity || 1)).toLocaleString()"></p>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Order Footer: Total + Tracking -->
                <div class="px-6 py-4 bg-gray-50 dark:bg-black/30 border-t border-gray-100 dark:border-bmw-darkBorder flex flex-wrap items-center justify-between gap-4">
                    <div class="flex items-center gap-4">
                        <template x-if="order.courier_name || order.tracking_number">
                            <div class="text-xs text-gray-500 dark:text-gray-400">
                                <span x-show="order.courier_name" x-text="order.courier_name" class="font-medium"></span>
                                <span x-show="order.tracking_number" class="ml-1 font-mono" x-text="order.tracking_number"></span>
                            </div>
                        </template>
                    </div>
                    <div class="text-right">
                        <span class="text-xs text-gray-400 uppercase tracking-wider mr-2">{{ i18n "subtotal" }}</span>
                        <span class="text-lg font-bold text-bmw-blue" x-text="'₩' + (order.total_amount || 0).toLocaleString()"></span>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <script>
        function myOrdersPage() {
            return {
                pb: null,
                orders: [],
                loading: true,
                loggedIn: false,
                error: '',

                async init() {
                    this.pb = new PocketBase(window.location.origin);

                    if (!this.pb.authStore.isValid) {
                        this.loading = false;
                        this.loggedIn = false;
                        return;
                    }

                    this.loggedIn = true;

                    try {
                        // Refresh auth to ensure token is valid
                        await this.pb.collection('users').authRefresh();

                        // Fetch orders with nested expand: order_items + product
                        const result = await this.pb.collection('orders').getList(1, 50, {
                            expand: 'order_items_via_order.product'
                        });

                        this.orders = result.items;
                    } catch (err) {
                        console.error('Failed to fetch orders:', err);
                        if (err.status === 401) {
                            this.pb.authStore.clear();
                            this.loggedIn = false;
                        } else {
                            this.error = '주문 내역을 불러오는 데 실패했습니다.';
                        }
                    } finally {
                        this.loading = false;
                    }
                },

                formatDate(dateStr) {
                    if (!dateStr) return '';
                    const d = new Date(dateStr);
                    return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
                },

                statusClass(status) {
                    const map = {
                        'pending':   'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400',
                        'paid':      'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400',
                        'shipping':  'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400',
                        'completed': 'bg-gray-100 text-gray-800 dark:bg-gray-700/30 dark:text-gray-300',
                        'cancelled': 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400',
                        'refunded':  'bg-purple-100 text-purple-800 dark:bg-purple-900/30 dark:text-purple-400',
                    };
                    return map[status] || 'bg-gray-100 text-gray-800';
                },

                statusLabel(status) {
                    const labels = {
                        'pending':   '결제대기',
                        'paid':      '결제완료',
                        'shipping':  '배송중',
                        'completed': '배송완료',
                        'cancelled': '취소',
                        'refunded':  '환불',
                    };
                    return labels[status] || status;
                }
            }
        }
    </script>
</main>
{{ end }}
