<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BMW Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bmw: { blue: '#1C69D4', dark: '#111', surface: '#1A1A1A', border: '#333' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #111; color: #FFF; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
</head>
<body class="bg-bmw-dark text-white min-h-screen flex flex-col">
    <nav class="bg-black/90 backdrop-blur-md sticky top-0 z-50 border-b border-bmw-border" x-data="{ loggedIn: document.cookie.includes('pb_auth='), cartOpen: false }" @open-cart.window="cartOpen = true; fetch('/cart/view').then(r=>r.text()).then(html => $refs.cartContent.innerHTML = html)">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-widest text-white hover:text-bmw-blue transition duration-300">
                BMW SHOP
            </a>
            <div class="flex items-center gap-6 text-sm font-medium text-gray-400">
                <a href="/" class="hover:text-white transition">CATALOG</a>
                <a href="#" @click.prevent="cartOpen = true; fetch('/cart/view').then(r=>r.text()).then(html => $refs.cartContent.innerHTML = html)" class="hover:text-white transition">CART</a>
                <a href="/my-orders" class="hover:text-white transition">ORDERS</a>
                
                <template x-if="!loggedIn">
                    <a href="/login" class="hover:text-white transition">LOGIN</a>
                </template>
                <template x-if="loggedIn">
                    <button @click="document.cookie = 'pb_auth=; Max-Age=0; path=/'; window.location.href='/';" class="hover:text-white transition uppercase tracking-widest text-gray-400">LOGOUT</button>
                </template>
            </div>
        </div>

        <!-- Sidebar Cart Modal -->
        <template x-teleport="body">
            <div x-show="cartOpen" class="fixed inset-0 z-[100] flex justify-end" style="display: none;">
                <!-- Backdrop -->
                <div x-show="cartOpen" x-transition.opacity class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="cartOpen = false"></div>
                
                <!-- Sidebar -->
                <div x-show="cartOpen" 
                     x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="translate-x-full"
                     x-transition:enter-end="translate-x-0"
                     x-transition:leave="transition ease-in duration-300"
                     x-transition:leave-start="translate-x-0"
                     x-transition:leave-end="translate-x-full"
                     class="relative w-full max-w-md bg-bmw-dark shadow-2xl h-full flex flex-col border-l border-bmw-border relative">
                    
                    <div class="flex items-center justify-between p-6 border-b border-bmw-border">
                        <h2 class="text-xl font-light tracking-widest text-white">YOUR CART</h2>
                        <button @click="cartOpen = false" class="text-gray-400 hover:text-white text-3xl leading-none font-light">&times;</button>
                    </div>

                    <div x-ref="cartContent" class="flex-1 overflow-hidden p-6 relative">
                        <div class="flex items-center justify-center h-full text-gray-500">
                            Loading cart...
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </nav>
    <main class="max-w-7xl mx-auto px-4 py-12 flex-1 w-full" x-data="authForm()">
        <div class="max-w-md mx-auto py-8">
            <h1 class="text-3xl font-light mb-8 text-center tracking-widest" x-text="tab === 'login' ? 'SIGN IN' : 'CREATE ACCOUNT'"></h1>
            
            <div class="flex mb-8 border-b border-bmw-border">
                <button @click="tab = 'login'; error = ''" :class="tab==='login' ? 'text-white border-b-2 border-bmw-blue' : 'text-gray-500'" class="flex-1 pb-4 uppercase tracking-widest text-sm font-medium transition">Sign In</button>
                <button @click="tab = 'register'; error = ''" :class="tab==='register' ? 'text-white border-b-2 border-bmw-blue' : 'text-gray-500'" class="flex-1 pb-4 uppercase tracking-widest text-sm font-medium transition">Register</button>
            </div>

            <div class="bg-bmw-surface border border-bmw-border p-8 rounded-sm">
                <!-- Error Alert -->
                <div x-show="error" x-cloak class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 mb-6 flex justify-between items-center text-sm">
                    <span x-text="error"></span>
                    <button @click="error=''" class="hover:text-white">&times;</button>
                </div>

                <!-- LOGIN FORM -->
                <form x-show="tab === 'login'" @submit.prevent="login()" class="space-y-6">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 uppercase tracking-wide">Email</label>
                        <input type="email" x-model="loginData.email" required class="w-full bg-[#111] border border-bmw-border text-white px-4 py-3 focus:outline-none focus:border-bmw-blue transition" />
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 uppercase tracking-wide">Password</label>
                        <input type="password" x-model="loginData.password" required class="w-full bg-[#111] border border-bmw-border text-white px-4 py-3 focus:outline-none focus:border-bmw-blue transition" />
                    </div>
                    <button type="submit" :disabled="loading" class="w-full bg-bmw-blue hover:bg-blue-700 disabled:opacity-50 text-white px-8 py-3 uppercase tracking-wider text-sm font-medium transition duration-300">
                        <span x-show="!loading">Sign In</span>
                        <span x-show="loading">Authenticating...</span>
                    </button>
                </form>

                <!-- REGISTER FORM -->
                <form x-show="tab === 'register'" x-cloak @submit.prevent="register()" class="space-y-6">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 uppercase tracking-wide">Email</label>
                        <input type="email" x-model="regData.email" required class="w-full bg-[#111] border border-bmw-border text-white px-4 py-3 focus:outline-none focus:border-bmw-blue transition" />
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 uppercase tracking-wide">Password</label>
                        <input type="password" x-model="regData.password" required class="w-full bg-[#111] border border-bmw-border text-white px-4 py-3 focus:outline-none focus:border-bmw-blue transition" />
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2 uppercase tracking-wide">Confirm Password</label>
                        <input type="password" x-model="regData.passwordConfirm" required class="w-full bg-[#111] border border-bmw-border text-white px-4 py-3 focus:outline-none focus:border-bmw-blue transition" />
                    </div>
                    <div class="pt-4 border-t border-bmw-border">
                        <label class="block text-sm text-gray-400 mb-2 uppercase tracking-wide">Nickname</label>
                        <input type="text" x-model="regData.nickname" required class="w-full bg-[#111] border border-bmw-border text-white px-4 py-3 focus:outline-none focus:border-bmw-blue transition mb-4" />
                        
                        <label class="block text-sm text-gray-400 mb-2 uppercase tracking-wide">Phone Number</label>
                        <input type="text" x-model="regData.phone" class="w-full bg-[#111] border border-bmw-border text-white px-4 py-3 focus:outline-none focus:border-bmw-blue transition mb-4" />
                        
                        <label class="block text-sm text-gray-400 mb-2 uppercase tracking-wide">Address</label>
                        <input type="text" x-model="regData.address" class="w-full bg-[#111] border border-bmw-border text-white px-4 py-3 focus:outline-none focus:border-bmw-blue transition" />
                    </div>

                    <button type="submit" :disabled="loading" class="w-full bg-bmw-blue hover:bg-blue-700 disabled:opacity-50 text-white px-8 py-3 uppercase tracking-wider text-sm font-medium transition duration-300">
                        <span x-show="!loading">Create Account</span>
                        <span x-show="loading">Processing...</span>
                    </button>
                </form>

                <div class="mt-8 text-center text-sm text-gray-500 relative">
                    <span class="bg-bmw-surface px-4 relative z-10">OR CONTINUE WITH</span>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="w-full border-t border-bmw-border"></div>
                    </div>
                </div>

                <div class="mt-8">
                    <button @click="oauthLogin()" class="w-full bg-white text-black hover:bg-gray-200 px-8 py-3 uppercase tracking-wider text-sm font-bold transition duration-300 flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
                        Google Login
                    </button>
                </div>
            </div>
        </div>

        <script>
            function authForm() {
                return {
                    tab: 'login',
                    loading: false,
                    error: '',
                    pb: null,
                    loginData: { email: '', password: '' },
                    regData: { email: '', password: '', passwordConfirm: '', nickname: '', phone: '', address: '' },
                    
                    init() {
                        this.pb = new PocketBase('/');
                    },
                    
                    async login() {
                        this.loading = true;
                        this.error = '';
                        try {
                            const authData = await this.pb.collection('users').authWithPassword(this.loginData.email, this.loginData.password);
                            document.cookie = 'pb_auth=' + this.pb.authStore.token + '; path=/; max-age=2592000; SameSite=Lax';
                            window.location.href = '/my-orders';
                        } catch (err) {
                            this.error = err.message || 'Login failed. Please check your credentials.';
                        } finally {
                            this.loading = false;
                        }
                    },
                    
                    async register() {
                        if (this.regData.password !== this.regData.passwordConfirm) {
                            this.error = 'Passwords do not match.';
                            return;
                        }
                        this.loading = true;
                        this.error = '';
                        try {
                            await this.pb.collection('users').create(this.regData);
                            await this.pb.collection('users').authWithPassword(this.regData.email, this.regData.password);
                            document.cookie = 'pb_auth=' + this.pb.authStore.token + '; path=/; max-age=2592000; SameSite=Lax';
                            window.location.href = '/my-orders';
                        } catch (err) {
                            this.error = err.message || 'Registration failed. Email might already be in use.';
                        } finally {
                            this.loading = false;
                        }
                    },
                    
                    async oauthLogin() {
                        this.error = '';
                        try {
                            await this.pb.collection('users').authWithOAuth2({ provider: 'google' });
                            document.cookie = 'pb_auth=' + this.pb.authStore.token + '; path=/; max-age=2592000; SameSite=Lax';
                            window.location.href = '/my-orders';
                        } catch (err) {
                            this.error = 'OAuth2 Login Failed: ' + (err.message || '');
                        }
                    }
                };
            }
        </script>
    </main>
    <footer class="bg-black border-t border-bmw-border py-8 text-center text-xs text-gray-500">
        <p>&copy; 2026 BMW eCommerce Example.</p>
    </footer>
</body>
</html>
