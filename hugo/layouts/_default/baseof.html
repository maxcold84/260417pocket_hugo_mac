<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if eq .Type "shell" }}{{ print "{{.title}}" | safeHTML }}{{ else }}{{ block "title" . }}{{ .Title | default "BMW Shop" }}{{ end }}{{ end }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bmw: {
                            blue: '#1C69D4',
                            dark: '#111111',
                            surface: '#1A1A1A',
                            border: '#e5e7eb',
                            darkBorder: '#333333'
                        }
                    }
                }
            }
        }
    </script>
    <script>
        // Prevent FOUC for dark mode
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    <style>
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
</head>
<body class="bg-gray-50 dark:bg-bmw-dark text-gray-900 dark:text-white min-h-screen flex flex-col transition-colors duration-300" 
      x-data="appData()" 
      @add-to-cart.window="addToCart($event.detail)" 
      @open-cart.window="cartOpen = true">
    <nav class="bg-white/90 dark:bg-black/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-200 dark:border-bmw-darkBorder transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-widest text-gray-900 dark:text-white hover:text-bmw-blue dark:hover:text-bmw-blue transition duration-300">
                BMW SHOP
            </a>
            <div class="flex items-center gap-6 text-sm font-medium text-gray-500 dark:text-gray-400">
                <a href="/" class="hover:text-gray-900 dark:hover:text-white transition">CATALOG</a>
                <a href="#" @click.prevent="cartOpen = true" class="hover:text-gray-900 dark:hover:text-white transition">CART (<span x-text="cart.length"></span>)</a>
                <a href="/my-orders" class="hover:text-gray-900 dark:hover:text-white transition">ORDERS</a>
                
                <template x-if="!loggedIn">
                    <a href="/login" class="hover:text-gray-900 dark:hover:text-white transition">LOGIN</a>
                </template>
                <template x-if="loggedIn">
                    <button @click="document.cookie = 'pb_auth=; Max-Age=0; path=/'; window.location.href='/';" class="hover:text-gray-900 dark:hover:text-white transition uppercase tracking-widest">LOGOUT</button>
                </template>

                <!-- Dark Mode Toggle -->
                <button @click="toggleDark()" 
                        class="ml-4 text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition flex items-center justify-center p-2 rounded-full focus:outline-none focus:ring-2 focus:ring-bmw-blue">
                    <svg x-show="!darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <svg x-show="darkMode" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </button>
            </div>
        </div>

        <!-- Sidebar Cart Modal -->
        <template x-teleport="body">
            <div x-show="cartOpen" class="fixed inset-0 z-[100] flex justify-end" style="display: none;">
                <!-- Backdrop -->
                <div x-show="cartOpen" x-transition.opacity class="absolute inset-0 bg-black/60 backdrop-blur-sm" @click="cartOpen = false"></div>
                
                <!-- Sidebar -->
                <div x-show="cartOpen" 
                     x-transition:enter="transition ease-out duration-300"
                     x-transition:enter-start="translate-x-full"
                     x-transition:enter-end="translate-x-0"
                     x-transition:leave="transition ease-in duration-300"
                     x-transition:leave-start="translate-x-0"
                     x-transition:leave-end="translate-x-full"
                     class="relative w-full max-w-md bg-white dark:bg-bmw-dark shadow-2xl h-full flex flex-col border-l border-gray-200 dark:border-bmw-darkBorder relative">
                    
                    <div class="flex items-center justify-between p-6 border-b border-gray-200 dark:border-bmw-darkBorder">
                        <h2 class="text-xl font-light tracking-widest text-gray-900 dark:text-white">YOUR CART</h2>
                        <button @click="cartOpen = false" class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white text-3xl leading-none font-light">&times;</button>
                    </div>

                    <div class="flex-1 overflow-hidden relative flex flex-col">
                        <template x-if="cart.length === 0">
                            <div class="flex items-center justify-center h-full"><p class="text-gray-400 dark:text-gray-500 text-sm">Your cart is empty.</p></div>
                        </template>
                        <template x-if="cart.length > 0">
                            <div class="flex flex-col h-full">
                                <div class="flex-1 overflow-y-auto pr-2 p-6">
                                    <template x-for="item in cart" :key="item.id">
                                        <div class="flex items-start justify-between py-4 border-b border-gray-200 dark:border-bmw-darkBorder gap-4">
                                            <div class="w-16 h-16 bg-gray-100 dark:bg-black flex-shrink-0 flex items-center justify-center text-[10px] text-gray-500 uppercase border border-gray-200 dark:border-bmw-darkBorder">
                                                <template x-if="item.image">
                                                    <img :src="item.image" class="w-full h-full object-cover">
                                                </template>
                                                <span x-show="!item.image">IMG</span>
                                            </div>
                                            <div class="flex-1 min-w-0">
                                                <h3 class="font-medium text-sm text-gray-900 dark:text-white truncate" x-text="item.name"></h3>
                                                <p class="text-xs text-gray-500 mt-1">
                                                    <span x-text="'₩' + item.price.toLocaleString()"></span> x 
                                                    <input type="number" x-model.number="item.quantity" @change="updateQuantity(item.id, item.quantity)" class="w-12 bg-transparent border border-gray-300 dark:border-gray-600 text-center text-xs p-1 ml-1 rounded text-gray-900 dark:text-white">
                                                </p>
                                            </div>
                                            <div class="text-right flex-shrink-0 flex flex-col items-end gap-2">
                                                <p class="font-medium text-sm text-gray-900 dark:text-white" x-text="'₩' + (item.price * item.quantity).toLocaleString()"></p>
                                                <button @click="removeFromCart(item.id)" class="text-xs text-red-500 hover:text-red-700">Remove</button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                                <div class="mt-auto pt-4 border-t border-gray-200 dark:border-bmw-darkBorder bg-gray-50 dark:bg-bmw-dark z-10 sticky bottom-0 p-6">
                                    <div class="flex justify-between items-center text-sm font-medium mb-6">
                                        <span class="text-gray-500 tracking-wider">SUBTOTAL</span>
                                        <span class="text-gray-900 dark:text-white text-lg" x-text="'₩' + cartTotal.toLocaleString()"></span>
                                    </div>
                                    <a href="/checkout" class="block w-full bg-bmw-blue hover:bg-blue-700 text-white text-center py-4 uppercase tracking-wider text-sm font-medium transition duration-300">
                                        PROCEED TO CHECKOUT
                                    </a>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </nav>

    {{ block "main" . }}{{ end }}

    <footer class="bg-gray-100 dark:bg-black border-t border-gray-200 dark:border-bmw-darkBorder py-8 text-center text-xs text-gray-500">
        <p>&copy; 2026 BMW eCommerce Example.</p>
    </footer>

    <script>
        function appData() {
            return {
                loggedIn: document.cookie.includes('pb_auth='), 
                cartOpen: false, 
                darkMode: document.documentElement.classList.contains('dark'),
                cart: JSON.parse(localStorage.getItem('cart') || '[]'),
                init() {
                    this.$watch('cart', value => localStorage.setItem('cart', JSON.stringify(value)));
                },
                toggleDark() {
                    this.darkMode = !this.darkMode;
                    if(this.darkMode) {
                        document.documentElement.classList.add('dark');
                        localStorage.theme = 'dark';
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.theme = 'light';
                    }
                },
                addToCart(product) {
                    const existing = this.cart.find(i => i.id === product.id);
                    if (existing) {
                        existing.quantity += parseInt(product.quantity || 1);
                    } else {
                        this.cart.push({...product, quantity: parseInt(product.quantity || 1)});
                    }
                    this.cartOpen = true;
                },
                removeFromCart(productId) {
                    this.cart = this.cart.filter(i => i.id !== productId);
                },
                updateQuantity(productId, qty) {
                    const item = this.cart.find(i => i.id === productId);
                    if (item) {
                        item.quantity = parseInt(qty);
                        if (item.quantity <= 0) this.removeFromCart(productId);
                    }
                },
                get cartTotal() {
                    return this.cart.reduce((total, item) => total + (item.price * item.quantity), 0);
                }
            }
        }
    </script>
</body>
</html>
