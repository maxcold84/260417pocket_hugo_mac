{{ define "main" }}
<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "ko-kr" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title | default site.Title }} CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bmw: {
                            blue: '#1C69D4',
                            dark: '#111111',
                            surface: '#1A1A1A',
                            border: '#e5e7eb',
                            darkBorder: '#333333'
                        }
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/pocketbase/dist/pocketbase.umd.js"></script>
    <style>
        /* Hide number input spin buttons */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield; /* Firefox */
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased min-h-screen" x-data="cmsApp()">

    <!-- Login Screen -->
    <template x-if="!isLoggedIn">
        <div class="min-h-screen flex items-center justify-center bg-gray-50">
            <div class="max-w-md w-full p-8 bg-white shadow-lg rounded-sm border border-gray-200">
                <h1 class="text-2xl font-light tracking-widest text-center mb-8 uppercase">{{ i18n "cms_login" }}</h1>
                <form @submit.prevent="login" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2 uppercase">{{ i18n "admin_email" }}</label>
                        <input type="email" x-model="email" required class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-bmw-blue focus:border-bmw-blue outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2 uppercase">{{ i18n "password" }}</label>
                        <input type="password" x-model="password" required class="w-full border border-gray-300 p-3 rounded focus:ring-2 focus:ring-bmw-blue focus:border-bmw-blue outline-none transition">
                    </div>
                    <div x-show="error" class="text-red-500 text-sm p-3 bg-red-50 border border-red-200 rounded" x-text="error" style="display: none;"></div>
                    <button type="submit" class="w-full bg-bmw-blue hover:bg-blue-700 text-white p-3 rounded uppercase tracking-wider font-medium transition" :disabled="loading">
                        <span x-show="!loading">{{ i18n "login" }}</span>
                        <span x-show="loading">{{ i18n "authenticating" }}</span>
                    </button>
                </form>
            </div>
        </div>
    </template>

    <!-- Dashboard -->
    <template x-if="isLoggedIn">
        <div class="flex h-screen overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-64 bg-bmw-dark text-white flex flex-col flex-shrink-0">
                <div class="h-16 flex items-center px-6 border-b border-bmw-darkBorder bg-black">
                    <span class="text-lg font-bold tracking-widest text-white">{{ site.Title | upper }} CMS</span>
                </div>
                <div class="flex-1 overflow-y-auto py-4">
                    <nav class="space-y-1 px-3">
                        <button @click="currentTab = 'products'; fetchProducts()" 
                                :class="{'bg-bmw-blue text-white': currentTab === 'products', 'text-gray-300 hover:bg-bmw-surface hover:text-white': currentTab !== 'products'}"
                                class="w-full flex items-center px-3 py-2 text-sm font-medium rounded-md transition uppercase">
                            {{ i18n "catalog" }}
                        </button>
                        <button @click="currentTab = 'orders'; fetchOrders()" 
                                :class="{'bg-bmw-blue text-white': currentTab === 'orders', 'text-gray-300 hover:bg-bmw-surface hover:text-white': currentTab !== 'orders'}"
                                class="w-full flex items-center px-3 py-2 text-sm font-medium rounded-md transition uppercase">
                            {{ i18n "orders" }}
                        </button>
                    </nav>
                </div>
                <div class="p-4 border-t border-bmw-darkBorder bg-black">
                    <button @click="logout" class="w-full text-left text-sm text-gray-400 hover:text-white transition uppercase">{{ i18n "logout" }}</button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 overflow-y-auto bg-gray-100 focus:outline-none">
                <div class="h-16 flex items-center px-8 border-b border-gray-200 bg-white justify-between sticky top-0 z-10 shadow-sm">
                    <h2 class="text-xl font-light tracking-wide uppercase" x-text="currentTab"></h2>
                    <template x-if="currentTab === 'products'">
                        <div class="flex gap-4">
                            <button @click="rebuildSite" class="bg-gray-800 hover:bg-black text-white px-4 py-2 text-sm rounded transition shadow-sm border border-gray-600 flex items-center gap-2" :disabled="isRebuilding">
                                <span x-show="!isRebuilding">{{ i18n "sync_rebuild" }}</span>
                                <span x-show="isRebuilding">{{ i18n "processing" }}</span>
                            </button>
                            <button @click="openAddProductModal" class="bg-bmw-blue hover:bg-blue-700 text-white px-4 py-2 text-sm rounded transition shadow-sm">
                                + {{ i18n "add_product" }}
                            </button>
                        </div>
                    </template>
                </div>

                <div class="p-8">
                    <!-- Products Tab -->
                    <template x-if="currentTab === 'products'">
                        <div class="bg-white shadow-sm rounded border border-gray-200 overflow-hidden">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ i18n "product_image" }}</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ i18n "ui_name" }} / {{ i18n "ui_slug" }}</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ i18n "price" }} (₩)</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ i18n "stock" }}</th>
                                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">{{ i18n "actions" }}</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    <template x-for="product in products" :key="product.id">
                                        <tr class="hover:bg-gray-50">
                                            <td class="px-6 py-4 whitespace-nowrap">
                                                <template x-if="product.images && product.images.length > 0">
                                                    <img :src="'/api/files/products/' + product.id + '/' + product.images[0]" class="w-12 h-12 object-cover rounded border border-gray-200">
                                                </template>
                                                <template x-if="!product.images || product.images.length === 0">
                                                    <div class="w-12 h-12 bg-gray-100 flex items-center justify-center text-xs text-gray-400 rounded border border-gray-200">IMG</div>
                                                </template>
                                            </td>
                                            <td class="px-6 py-4">
                                                <div class="text-sm font-medium text-gray-900" x-text="product.name"></div>
                                                <div class="text-sm text-gray-500" x-text="product.slug"></div>
                                            </td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="product.price.toLocaleString()"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                <input type="number" x-model.number="product.stock" @change="updateStock(product.id, product.stock)" class="w-20 border border-gray-300 p-1 text-sm rounded text-center">
                                            </td>
                                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-3">
                                                <button @click="openEditProductModal(product)" class="text-bmw-blue hover:text-blue-900 font-medium">{{ i18n "edit_product" }}</button>
                                                <button @click="deleteProduct(product.id)" class="text-red-600 hover:text-red-900">{{ i18n "delete" }}</button>
                                            </td>
                                        </tr>
                                    </template>
                                    <template x-if="products.length === 0">
                                        <tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">{{ i18n "no_products_found" }}</td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>

                    <!-- Orders Tab -->
                    <template x-if="currentTab === 'orders'">
                        <div class="bg-white shadow-sm rounded border border-gray-200 overflow-hidden">
                            <!-- Search Bar -->
                            <div class="p-4 border-b border-gray-200 bg-gray-50 flex justify-between items-center">
                                <div class="relative w-full max-w-md">
                                    <input type="text" x-model="orderSearchQuery" @input.debounce.500ms="fetchOrders()" placeholder="{{ i18n "search_placeholder" }}" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-bmw-blue focus:border-bmw-blue outline-none transition text-sm">
                                    <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                </div>
                            </div>
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Order ID</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ i18n "ui_date" }}</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ i18n "amount" }} (₩)</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ i18n "status" }}</th>
                                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">{{ i18n "info" }}</th>
                                        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">{{ i18n "actions" }}</th>
                                    </tr>
                                </thead>
                                <tbody class="bg-white divide-y divide-gray-200">
                                    <template x-for="order in orders" :key="order.id">
                                        <tr class="hover:bg-gray-50">
                                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" x-text="order.id"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="new Date(order.created).toLocaleString()"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="order.total_amount.toLocaleString()"></td>
                                            <td class="px-6 py-4 whitespace-nowrap">
                                                <select x-model="order.status" @change="updateOrderStatus(order.id, order.status)" class="border border-gray-300 p-1 text-sm rounded bg-white" :class="{
                                                    'text-yellow-600': order.status === 'pending',
                                                    'text-green-600': order.status === 'paid',
                                                    'text-red-600': order.status === 'cancelled' || order.status === 'refunded'
                                                }">
                                                    <option value="pending">Pending</option>
                                                    <option value="paid">Paid</option>
                                                    <option value="cancelled">Cancelled</option>
                                                    <option value="refunded">Refunded</option>
                                                </select>
                                            </td>
                                            <td class="px-6 py-4 text-sm text-gray-500">
                                                <div x-text="order.expand?.user?.email || order.guest_info?.email || 'Unknown User'"></div>
                                                <div class="text-xs text-gray-400" x-show="order.portone_tx_id" x-text="'Tx: ' + order.portone_tx_id"></div>
                                            </td>
                                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                                <button @click="deleteOrder(order.id)" class="text-red-600 hover:text-red-900">{{ i18n "delete" }}</button>
                                            </td>
                                        </tr>
                                    </template>
                                    <template x-if="orders.length === 0">
                                        <tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">No orders found.</td></tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>
                </div>
            </main>
        </div>
    </template>

    <!-- Add Product Modal -->
        <template x-teleport="body">
            <div x-show="showAddModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" style="display: none;">
                <div @click.away="showAddModal = false" class="bg-white p-8 rounded shadow-2xl w-full max-w-lg border border-gray-200">
                    <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                        <h3 class="text-xl font-light tracking-wide uppercase">{{ i18n "add_product" }}</h3>
                        <button @click="showAddModal = false" class="text-gray-400 hover:text-gray-900 text-2xl leading-none">&times;</button>
                    </div>
                    <form @submit.prevent="createProduct" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "ui_name" }}</label>
                            <input type="text" x-model="newProduct.name" required class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "ui_slug" }}</label>
                            <input type="text" x-model="newProduct.slug" @input="_slugTouched = true" required class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none text-sm text-gray-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "ui_description" }}</label>
                            <textarea x-model="newProduct.description" rows="3" class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "product_image" }}</label>
                            <input type="file" x-ref="imageInput" multiple accept="image/jpeg, image/png, image/webp" class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none text-sm text-gray-500 bg-white">
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "price" }} (₩)</label>
                                <input type="number" x-model.number="newProduct.price" required class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "stock" }}</label>
                                <input type="number" x-model.number="newProduct.stock" required class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none">
                            </div>
                        </div>
                        <div class="pt-4 flex justify-end gap-3">
                            <button type="button" @click="showAddModal = false" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 border border-gray-300 rounded uppercase">{{ i18n "cancel" }}</button>
                            <button type="submit" class="px-4 py-2 text-sm text-white bg-bmw-blue hover:bg-blue-700 rounded transition uppercase" :disabled="loading">{{ i18n "add_product" }}</button>
                        </div>
                    </form>
                </div>
            </div>
        </template>

    <!-- Edit Product Modal -->
        <template x-teleport="body">
            <div x-show="showEditModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm" style="display: none;">
                <div @click.away="showEditModal = false" class="bg-white p-8 rounded shadow-2xl w-full max-w-lg border border-gray-200">
                    <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
                        <h3 class="text-xl font-light tracking-wide uppercase">{{ i18n "edit_product" }}</h3>
                        <button @click="showEditModal = false" class="text-gray-400 hover:text-gray-900 text-2xl leading-none">&times;</button>
                    </div>
                    <form @submit.prevent="updateProduct" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "ui_name" }}</label>
                            <input type="text" x-model="editProduct.name" required class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "ui_slug" }}</label>
                            <input type="text" x-model="editProduct.slug" required class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none text-sm text-gray-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "ui_description" }}</label>
                            <textarea x-model="editProduct.description" rows="3" class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "product_image" }}</label>
                            <template x-if="editProduct._currentImages && editProduct._currentImages.length > 0">
                                <div class="mb-3 flex flex-wrap gap-2">
                                    <template x-for="(imgUrl, index) in editProduct._currentImages" :key="index">
                                        <div class="relative">
                                            <img :src="imgUrl" class="w-16 h-16 object-cover rounded border border-gray-200">
                                        </div>
                                    </template>
                                </div>
                            </template>
                            <input type="file" x-ref="editImageInput" multiple accept="image/jpeg, image/png, image/webp" class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none text-sm text-gray-500 bg-white">
                        </div>
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "price" }} (₩)</label>
                                <input type="number" x-model.number="editProduct.price" required class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none">
                            </div>
                            <div class="flex-1">
                                <label class="block text-sm font-medium text-gray-700 mb-1 uppercase">{{ i18n "stock" }}</label>
                                <input type="number" x-model.number="editProduct.stock" required class="w-full border border-gray-300 p-2 rounded focus:ring-1 focus:ring-bmw-blue outline-none">
                            </div>
                        </div>
                        <div class="pt-4 flex justify-end gap-3">
                            <button type="button" @click="showEditModal = false" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900 border border-gray-300 rounded uppercase">{{ i18n "cancel" }}</button>
                            <button type="submit" class="px-4 py-2 text-sm text-white bg-bmw-blue hover:bg-blue-700 rounded transition uppercase" :disabled="loading">{{ i18n "save_changes" }}</button>
                        </div>
                    </form>
                </div>
            </div>
        </template>

    <script>
        const pb = new PocketBase('http://127.0.0.1:8090');

        function cmsApp() {
            return {
                isLoggedIn: pb.authStore.isValid && (pb.authStore.isSuperuser || pb.authStore.isAdmin),
                email: '',
                password: '',
                error: '',
                loading: false,
                isRebuilding: false,
                currentTab: 'products',
                products: [],
                orders: [],
                orderSearchQuery: '',
                showAddModal: false,
                showEditModal: false,
                _slugTouched: false,
                newProduct: {
                    name: '',
                    slug: '',
                    description: '',
                    price: '',
                    stock: ''
                },
                editProduct: {
                    id: '',
                    name: '',
                    slug: '',
                    description: '',
                    price: '',
                    stock: '',
                    _currentImages: []
                },
                init() {
                    if (this.isLoggedIn) {
                        this.fetchProducts();
                    }
                    // Auto-slugify new product name (supports Korean IME)
                    this.$watch('newProduct.name', val => {
                        if (!this._slugTouched) {
                            this.newProduct.slug = val.toLowerCase().replace(/[^a-z0-9가-힣ㄱ-ㅎㅏ-ㅣ]+/g, '-').replace(/-+/g, '-').replace(/(^-|-$)+/g, '');
                        }
                    });
                },
                handleError(err, defaultMsg = '오류가 발생했습니다') {
                    if (err.status === 401 || err.status === 403) {
                        alert('권한이 없거나 세션이 만료되었습니다. 다시 로그인해주세요.');
                        this.logout();
                        return;
                    }
                    console.error(defaultMsg, err);
                    alert(`${defaultMsg}\n상세: ${err.message || JSON.stringify(err.data || err)}`);
                },
                async rebuildSite() {
                    this.isRebuilding = true;
                    try {
                        const data = await pb.send('/api/admin/rebuild', {
                            method: 'POST'
                        });
                        alert('{{ i18n "site_rebuilt_success" }}\n' + (data.message || ''));
                    } catch (err) {
                        this.handleError(err, 'Failed to rebuild site');
                    } finally {
                        this.isRebuilding = false;
                    }
                },
                async login() {
                    this.loading = true;
                    this.error = '';
                    try {
                        if (pb.collection && pb.collection('_superusers')) {
                            await pb.collection('_superusers').authWithPassword(this.email, this.password);
                        } else {
                            await pb.admins.authWithPassword(this.email, this.password);
                        }
                        this.isLoggedIn = true;
                        this.fetchProducts();
                    } catch (err) {
                        this.error = err.message || 'Invalid credentials.';
                    } finally {
                        this.loading = false;
                    }
                },
                logout() {
                    pb.authStore.clear();
                    this.isLoggedIn = false;
                },
                async fetchProducts() {
                    try {
                        const result = await pb.collection('products').getList(1, 50);
                        this.products = result.items;
                    } catch (err) {
                        if (err.status === 401) this.logout();
                        console.error('Error fetching products:', err);
                    }
                },
                async fetchOrders() {
                    try {
                        let filter = '';
                        if (this.orderSearchQuery) {
                            const q = this.orderSearchQuery.replace(/"/g, '\\"');
                            filter = `id ~ "${q}" || portone_tx_id ~ "${q}" || user.email ~ "${q}"`;
                        }
                        const result = await pb.collection('orders').getList(1, 50, { 
                            expand: 'user',
                            filter: filter
                        });
                        
                        let finalOrders = result.items;
                        if (this.orderSearchQuery) {
                            const sq = this.orderSearchQuery.toLowerCase();
                            finalOrders = finalOrders.filter(o => 
                                o.id.toLowerCase().includes(sq) ||
                                (o.portone_tx_id && o.portone_tx_id.toLowerCase().includes(sq)) ||
                                (o.expand?.user?.email && o.expand.user.email.toLowerCase().includes(sq)) ||
                                (o.guest_info?.email && o.guest_info.email.toLowerCase().includes(sq))
                            );
                        }
                        this.orders = finalOrders;
                    } catch (err) {
                        if (err.status === 401) this.logout();
                        console.error('Error fetching orders:', err);
                    }
                },
                async updateStock(id, newStock) {
                    try {
                        const stockValue = newStock === '' ? 0 : Number(newStock);
                        await pb.collection('products').update(id, { stock: stockValue });
                    } catch (err) {
                        this.handleError(err, '재고 업데이트 실패');
                        this.fetchProducts();
                    }
                },
                async updateOrderStatus(id, newStatus) {
                    try {
                        await pb.collection('orders').update(id, { status: newStatus });
                    } catch (err) {
                        this.handleError(err, '주문 상태 업데이트 실패');
                        this.fetchOrders();
                    }
                },
                async deleteProduct(id) {
                    if (confirm('{{ i18n "confirm_delete" }}')) {
                        try {
                            const orderItems = await pb.collection('order_items').getFullList({
                                filter: `product = "${id}"`
                            });
                            for (const item of orderItems) {
                                await pb.collection('order_items').delete(item.id);
                            }
                            await pb.collection('products').delete(id);
                            this.fetchProducts();
                        } catch (err) {
                            this.handleError(err, '상품 삭제 실패');
                        }
                    }
                },
                async deleteOrder(id) {
                    if (confirm('{{ i18n "confirm_delete" }}')) {
                        try {
                            const orderItems = await pb.collection('order_items').getFullList({
                                filter: `order = "${id}"`
                            });
                            for (const item of orderItems) {
                                await pb.collection('order_items').delete(item.id);
                            }
                            await pb.collection('orders').delete(id);
                            this.fetchOrders();
                        } catch (err) {
                            this.handleError(err, '주문 삭제 실패');
                        }
                    }
                },
                openAddProductModal() {
                    this.newProduct = { name: '', slug: '', description: '', price: '', stock: '' };
                    this._slugTouched = false;
                    if (this.$refs.imageInput) {
                        this.$refs.imageInput.value = '';
                    }
                    this.showAddModal = true;
                },
                openEditProductModal(product) {
                    this.editProduct = {
                        id: product.id,
                        name: product.name,
                        slug: product.slug,
                        description: product.description,
                        price: product.price,
                        stock: product.stock,
                        _currentImages: (product.images && product.images.length > 0)
                            ? product.images.map(img => '/api/files/products/' + product.id + '/' + img)
                            : []
                    };
                    this.$nextTick(() => {
                        if (this.$refs.editImageInput) {
                            this.$refs.editImageInput.value = '';
                        }
                    });
                    this.showEditModal = true;
                },
                async createProduct() {
                    this.loading = true;
                    try {
                        const formData = new FormData();
                        formData.append('name', this.newProduct.name);
                        formData.append('slug', this.newProduct.slug);
                        formData.append('description', this.newProduct.description);
                        formData.append('price', Number(this.newProduct.price) || 0);
                        formData.append('stock', Number(this.newProduct.stock) || 0);

                        const fileInput = this.$refs.imageInput;
                        if (fileInput && fileInput.files.length > 0) {
                            for (let i = 0; i < fileInput.files.length; i++) {
                                formData.append('images', fileInput.files[i]);
                            }
                        }

                        await pb.collection('products').create(formData);
                        this.showAddModal = false;
                        this.fetchProducts();
                    } catch (err) {
                        this.handleError(err, '상품 등록 실패');
                    } finally {
                        this.loading = false;
                    }
                },
                async updateProduct() {
                    this.loading = true;
                    try {
                        const formData = new FormData();
                        formData.append('name', this.editProduct.name);
                        formData.append('slug', this.editProduct.slug);
                        formData.append('description', this.editProduct.description);
                        formData.append('price', Number(this.editProduct.price) || 0);
                        formData.append('stock', Number(this.editProduct.stock) || 0);

                        const fileInput = this.$refs.editImageInput;
                        if (fileInput && fileInput.files.length > 0) {
                            for (let i = 0; i < fileInput.files.length; i++) {
                                formData.append('images', fileInput.files[i]);
                            }
                        }

                        await pb.collection('products').update(this.editProduct.id, formData);
                        this.showEditModal = false;
                        this.fetchProducts();
                    } catch (err) {
                        this.handleError(err, '상품 수정 실패');
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
{{ end }}
