{{ define "title" }}{{ .Title | default site.Title }}{{ end }}

{{ define "main" }}
<main class="max-w-7xl mx-auto px-4 py-12 flex-1 w-full text-gray-800 dark:text-gray-200">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
        <!-- Image Gallery (Alpine.js) -->
        <div class="flex flex-col gap-4" x-data="{ 
            images: {{ if .Params.images }}{{ .Params.images | jsonify }}{{ else if .Params.image }}[{{ .Params.image | jsonify }}]{{ else }}[]{{ end }},
            activeImage: 0 
        }">
            <!-- Main Image -->
            <div class="bg-white dark:bg-bmw-surface border border-gray-200 dark:border-bmw-darkBorder aspect-[4/3] flex items-center justify-center overflow-hidden">
                <template x-if="images.length > 0">
                    <img :src="images[activeImage]" alt="{{ .Title }}" class="w-full h-full object-cover transition-opacity duration-300">
                </template>
                <template x-if="images.length === 0">
                    <span class="text-gray-400 dark:text-gray-600 text-sm tracking-widest uppercase">{{ i18n "product_image" }}</span>
                </template>
            </div>
            
            <!-- Thumbnails -->
            <template x-if="images.length > 1">
                <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    <template x-for="(img, index) in images" :key="index">
                        <button @click="activeImage = index" 
                                class="w-20 h-20 flex-shrink-0 border-2 overflow-hidden focus:outline-none transition-colors duration-200"
                                :class="activeImage === index ? 'border-bmw-blue' : 'border-transparent hover:border-gray-300 dark:hover:border-gray-600'">
                            <img :src="img" class="w-full h-full object-cover">
                        </button>
                    </template>
                </div>
            </template>
        </div>
        <div class="flex flex-col justify-center">
            <h1 class="text-4xl font-light mb-4">{{ .Title }}</h1>
            <div class="text-2xl font-medium text-gray-900 dark:text-white mb-6">₩{{ lang.FormatNumberCustom 0 .Params.price }}</div>
            <div class="prose prose-invert text-gray-500 dark:text-gray-400 mb-8 max-w-none">
                {{ .Content }}
            </div>
            <!-- Add to Cart Button — uses shared Alpine.js localStorage cart via baseof.html -->
            <button 
                @click="$dispatch('add-to-cart', {
                    id: {{ .Params.id | jsonify }}, 
                    name: {{ .Title | jsonify }}, 
                    price: {{ .Params.price }}, 
                    image: {{ if .Params.images }}{{ index .Params.images 0 | jsonify }}{{ else if .Params.image }}{{ .Params.image | jsonify }}{{ else }}null{{ end }},
                    quantity: 1
                })"
                class="bg-bmw-blue hover:bg-blue-700 text-white px-8 py-4 uppercase tracking-widest text-sm font-bold transition duration-300 w-full md:w-auto rounded"
            >
                {{ i18n "add_to_cart" }}
            </button>
        </div>
    </div>
</main>
{{ end }}
